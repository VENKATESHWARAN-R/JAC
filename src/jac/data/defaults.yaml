# JAC package defaults — non-required tunables only.
#
# Required runtime values (model, provider keys) are intentionally NOT
# pre-filled here. They must be set via env, CLI, or a user/project
# config file. See CLAUDE.md "Fail-first, no hardcoding".
#
# Layering (highest → lowest precedence):
#   CLI args > env vars > <repo>/.agents/config.yaml > ~/.jac/config.yaml > this file
#
# Add non-required tunables here as they emerge. Keep this file small;
# anything that lives here is something every user inherits by default.

secrets:
  backend: keyring

compaction:
  # Useful context budget Gru runs against — NOT the model's published window.
  # Recent models advertise 1M+ but quality typically degrades past ~200-300k.
  # Bump if you trust your model with more; lower for cheaper models.
  max_context_tokens: 200000
  # Thresholds as percent of max_context_tokens.
  warn_pct: 60
  auto_compact_pct: 70
  refuse_pct: 85
  # Auto-compaction shrinks the kept history until it's below this percent.
  target_pct_after_compact: 50

cost:
  # Tool outputs above this estimated token count (chars/4 heuristic) get
  # routed through the active profile's small-tier model for summarization
  # — but only for tools opted in via @jac_tool(summarizable=True), and only
  # when the small tier is strictly cheaper per output token than the
  # current tier (pricing comes from providers.yaml). Original output is
  # always saved to <project>/.agents/cache/tool-results/ so the agent can
  # re-read via read_file.
  tool_result_threshold_tokens: 8000
  # Force-off list: tool names that must never be summarized even when
  # their decorator opted in. User override.
  no_summarize_tools: []
  # Force-on list: tool names that get summarized even when the decorator
  # default is False. Use sparingly — defaults exist for a reason.
  summarize_tools: []
  # Bidirectional sub-agent ↔ main-agent comms (D41). When true, sub-agents
  # get `ask_main_agent` and the main agent gets `respond_to_sub_agent`,
  # letting a sub-agent ask one focused clarifying question mid-run.
  # Hard cap = 5 round-trips per spawn (a sixth ask returns a graceful
  # "finalize with what you have" directive, not an error). Default off —
  # flip when you understand the doubled per-question cost.
  sub_agent_bidirectional: false
