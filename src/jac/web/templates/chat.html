{% extends "base.html" %}
{% block title %}Chat{% endblock %}
{% block content %}
<div class="console" id="chat-layout">
  <div class="chat-col">
    <div class="console-head">
      <span id="chat-session" class="mono faint">—</span>
      <button id="act-toggle" class="small ghost">activity ›</button>
    </div>

    <div id="transcript" class="transcript" aria-live="polite"></div>

    <!-- HITL prompts (approval / clarify) render here one-at-a-time as a pinned
         bar — never inline in the transcript, so scroll-back stays clean and a
         queued approval can't be missed. -->
    <div id="hitl-bar" class="hitl-bar" hidden>
      <div class="hitl-inner">
        <div class="hitl-count" id="hitl-count" hidden></div>
        <div class="hitl-body" id="hitl-body"></div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <form id="chat-form">
          <textarea id="chat-text" rows="1"
            placeholder="Message Gru…   (Enter to send, Shift+Enter for newline)"></textarea>
          <button type="submit" id="chat-send">Send</button>
        </form>
      </div>
    </div>
  </div>

  <aside class="activity" id="activity">
    <section class="act-sec">
      <div class="act-title">Tokens</div>
      <div id="act-tokens" class="act-body"><span class="dim">—</span></div>
    </section>
    <section class="act-sec">
      <div class="act-title">Minions <span id="act-minion-count" class="badge act-count">0</span></div>
      <div id="act-minions" class="act-body"><span class="dim">none active</span></div>
    </section>
    <section class="act-sec">
      <div class="act-title">Files <span id="act-file-count" class="badge act-count">0</span></div>
      <div id="act-files" class="act-body"><span class="dim">none yet</span></div>
    </section>

    <div class="act-divider">Environment</div>

    <section class="act-sec">
      <div class="act-title">A2A agents <span id="act-a2a-count" class="badge act-count">0</span></div>
      <div id="act-a2a" class="act-body"><span class="dim">none</span></div>
    </section>
    <section class="act-sec">
      <div class="act-title">MCP servers <span id="act-mcp-count" class="badge act-count">0</span></div>
      <div id="act-mcp" class="act-body"><span class="dim">none</span></div>
    </section>
    <section class="act-sec">
      <div class="act-title">Skills <span id="act-skills-count" class="badge act-count">0</span></div>
      <div id="act-skills" class="act-body"><span class="dim">none</span></div>
    </section>
  </aside>
</div>

<script>
  window.JAC_RESUME = {{ (resume | tojson) if resume else "null" }};
  window.JAC_NEW = {{ "true" if new else "false" }};
</script>
<script src="/static/chat.js" defer></script>
{% endblock %}
