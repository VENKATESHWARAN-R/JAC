# JAC documentation site
#
# Built with Zensical — https://zensical.org/docs/
# Served by `just docs-serve`, built by `just docs-build`.

[project]
site_name = "JAC"
site_description = "Just Another Companion/CLI — built on Pydantic AI."
site_author = "Venkateshwaran R"
site_url = "https://venkateshwaran-r.github.io/JAC/"
repo_url = "https://github.com/VENKATESHWARAN-R/JAC"
repo_name = "VENKATESHWARAN-R/JAC"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 Venkateshwaran R"

docs_dir = "docs"
site_dir = "site"

nav = [
    { "Overview" = "index.md" },
    { "User Guide" = [
        { "Getting started" = "user-guide/getting-started.md" },
        { "CLI reference" = "user-guide/cli-reference.md" },
        { "Configuration" = "user-guide/configuration.md" },
        { "Cost controls" = "user-guide/cost-controls.md" },
        { "Skills" = "user-guide/skills.md" },
        { "Sessions & memory" = "user-guide/sessions-and-memory.md" },
        { "Examples" = "user-guide/examples.md" },
        { "A2A operator" = "user-guide/a2a-operator.md" },
    ] },
    { "Version snapshots" = [
        { "v0.6.0" = "snapshots/v0.6.0.md" },
        { "v0.5.0" = "snapshots/v0.5.0.md" },
        { "Template" = "snapshots/template.md" },
    ] },
    { "Developer" = [
        { "Contributing" = "developer/contributing.md" },
        { "Module strategy" = "developer/module-strategy.md" },
        { "Codebase map" = "developer/codebase-map.md" },
        { "Capabilities & hooks" = "developer/capabilities.md" },
    ] },
    { "Design" = [
        { "Idea" = "idea.md" },
        { "Architecture" = "architecture.md" },
        { "Cost-efficient orchestration" = "design/cost-efficient-orchestration.md" },
        { "Progress" = [
            { "Dashboard" = "progress.md" },
            { "History" = "progress-history.md" },
            { "A2A log" = "progress-a2a.md" },
            { "Roadmap" = "progress-roadmap.md" },
            { "Archive 2026-05 reframe" = "progress-archive-2026-05.md" },
        ] },
        { "Changelog" = "changelog.md" },
        { "Documentation strategy" = "design/documentation-strategy.md" },
        { "Drift matrix" = "design/audit/drift-matrix.md" },
    ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions — start with the documented defaults so code blocks,
# admonitions, mermaid, and tasklists render the way ARCHITECTURE.md expects.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
